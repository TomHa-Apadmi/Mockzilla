on:
  push:
    branches:
      - develop

permissions:
  contents: write
  pull-requests: write
  actions: write

name: Release-Please

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.PAT_BS }}