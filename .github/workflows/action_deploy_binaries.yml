name: Deploy Binaries

on: 
  workflow_dispatch:
  push:
    tags:
      - mockzilla-v**
env:
  is_snapshot: ${{ github.ref_type == 'branch' }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_type }}
  cancel-in-progress: ${{ github.ref_type == 'branch' }}

jobs:
  finalise:
    environment: production
    runs-on: ubuntu-latest
    needs: [deploy-ios, deploy-maven]
    steps:
      - uses: googleapis/release-please-action@v4
        if: ${{ !env.is_snapshot }}
        with:
          release-type: simple
          skip-github-pull-request: true
  deploy-maven:
    environment: production
    runs-on: macos-14
    steps:
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.4.0'
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin' # See 'Supported distributions' for available options
          java-version: '17'
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
      - name: Install dependencies
        run: bundle install
      - name: Deploy package to Maven Central
        run: | 
          echo "is_snapshot: $is_snapshot"
          export GPG_TTY=$(tty)
          bundle exec fastlane publish_to_maven is_snapshot:$is_snapshot
        env:
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword:  ${{ secrets.GPG_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.GPG_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_PRIVATE_KEY }}
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.ORG_GRADLE_PROJECT_MAVENCENTRALUSERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.ORG_GRADLE_PROJECT_MAVENCENTRALPASSWORD }}
  deploy-ios:
    environment: production
    runs-on: macos-14
    steps:
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.4.0'
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
      - name: Install dependencies
        run: bundle install
      - name: Deploy package to Github for SPM & Cocoapods
        run: bundle exec fastlane ios publish_swift_package is_snapshot:$is_snapshot
        env:
          COCOAPODS_TRUNK_TOKEN: ${{ secrets.COCOAPODS_TRUNK_TOKEN }}
          IOS_DEPLOY_URL: ${{ secrets.IOS_DEPLOY_URL }}
  deploy-js:
    name: Publish JS files to GitHub release
    runs-on: macos-14
    if: ${{ github.ref_type != 'branch' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Install dependencies
        run: bundle install
      - name: Build JS packages
        run: bundle exec fastlane build_js_artifacts
      - name: Zip up assets
        run: |
          mv mockzilla/build/kotlin-webpack/js/productionExecutable javascript_output
          zip -r javascript_output.zip javascript_output
      - uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: javascript_output.zip
          tag: ${{ github.ref }}
          overwrite: true
