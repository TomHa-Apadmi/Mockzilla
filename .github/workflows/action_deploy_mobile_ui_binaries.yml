name: Deploy Mobile Ui KMP Binaries

on: 
  workflow_dispatch:
  push:
    tags:
      - mockzilla-mobile-ui-v**
env:
  is_snapshot: ${{ github.ref_type == 'branch' }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_type }}
  cancel-in-progress: false

jobs:
  deploy-flutter:
    needs: [ deploy-kotlin, deploy-swift ]
    runs-on: macos-14
    if: ${{ github.ref_type != 'branch' }}
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - name: Install dependencies
        run: bundle install
      - name: Download JS assets
        run: |
          export GPG_TTY=$(tty)
          bundle exec fastlane download_mockzilla_ui_mobile_js_assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: dart-lang/setup-dart@v1
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.0'
          channel: 'stable'
      - run: cd FlutterMockzilla/mockzilla_ui_mobile; flutter pub get
      - name: Publish
        run: cd FlutterMockzilla/mockzilla_ui_mobile; flutter pub publish --force
  release-please:
    needs: [deploy-flutter]
    runs-on: macos-14
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          if: ${{ !env.is_snapshot }}
          release-type: simple
          skip-github-pull-request: true
  pre-deploy-checks:
    runs-on: macos-14
    steps:
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.4.0'
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin' # See 'Supported distributions' for available options
          java-version: '17'
      - name: Install dependencies
        run: bundle install
      - name: Deploy package to Maven Central
        run: |
          export GPG_TTY=$(tty)
          bundle exec fastlane management_ui_pre_deploy_checks
        env:
          IS_BUILDING_FOR_DEPLOYMENT: ${{ true }}
  deploy-swift:
    environment: production
    runs-on: macos-14
    needs: [pre-deploy-checks]
    steps:
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.4.0'
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin' # See 'Supported distributions' for available options
          java-version: '17'
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
      - name: Install dependencies
        run: bundle install
      - name: Deploy package to Github for SPM & Cocoapods
        run: bundle exec fastlane ios publish_mobile_ui_swift_package is_snapshot:$is_snapshot
        env:
          COCOAPODS_TRUNK_TOKEN: ${{ secrets.COCOAPODS_TRUNK_TOKEN }}
          IOS_MOBILE_UI_DEPLOY_URL: ${{ secrets.IOS_MOBILE_UI_DEPLOY_URL }}
          IS_BUILDING_FOR_DEPLOYMENT: ${{ true }}
  deploy-kotlin:
    environment: production
    runs-on: macos-14
    needs: [pre-deploy-checks]
    steps:
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.4.0'
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin' # See 'Supported distributions' for available options
          java-version: '17'
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
      - name: Install dependencies
        run: bundle install
      - name: Deploy package to Maven Central
        run: |
          export GPG_TTY=$(tty)
          bundle exec fastlane publish_mobile_ui_to_maven is_snapshot:$is_snapshot
        env:
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword:  ${{ secrets.GPG_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.GPG_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_PRIVATE_KEY }}
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.ORG_GRADLE_PROJECT_MAVENCENTRALUSERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.ORG_GRADLE_PROJECT_MAVENCENTRALPASSWORD }}
  deploy-js:
    name: Publish JS files to GitHub release
    runs-on: macos-14
    if: ${{ github.ref_type != 'branch' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Install dependencies
        run: bundle install
      - name: Build JS packages
        run: bundle exec fastlane build_mobile_ui_js_artifacts
      - name: Zip up assets
        run: |
          mv mockzilla-management-ui/mockzilla-mobile-ui/build/kotlin-webpack/js/developmentExecutable javascript_output
          zip -r javascript_output.zip javascript_output
      - uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: javascript_output.zip
          tag: ${{ github.ref }}
          overwrite: true
