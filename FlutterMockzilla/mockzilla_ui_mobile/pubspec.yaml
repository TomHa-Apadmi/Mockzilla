name: mockzilla_ui_mobile
description: "Embedded UI for controlling the mockzilla server at runtime"
# x-release-please-start-version
version: 0.0.2
# x-release-please-end
homepage: https://apadmi-engineering.github.io/Mockzilla/
repository: https://github.com/Apadmi-Engineering/Mockzilla
issue_tracker: https://github.com/Apadmi-Engineering/Mockzilla/issues
documentation: https://apadmi-engineering.github.io/Mockzilla/

environment:
  sdk: '>=3.6.0 <4.0.0'
  flutter: '>=3.27.0'

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  pigeon: ^22.6.0

flutter:
  plugin:
    platforms:
      android:
        package: com.apadmi.mockzilla.mobile.ui
        pluginClass: MockzillaUiMobilePlugin
      ios:
        pluginClass: MockzillaUiMobilePlugin