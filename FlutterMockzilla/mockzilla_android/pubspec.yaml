        pluginClass: MockzillaAndroidPlugin

dependencies:
  flutter:
    sdk: flutter
  meta: ^1.15.0
  mockzilla_platform_interface: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  pigeon: ^22.6.0
  flutter_lints: ^2.0.0
  build_runner: ^2.4.13
  mockito: ^5.4.4
